<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Wellbeing — Health</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 class="app-header__title">Health</h1>
      <div class="app-header__actions">
        <a href="settings.html" class="icon-btn" aria-label="Profile"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20v-2a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v2"/></svg></a>
      </div>
    </header>
    <main>
      <div class="tabs">
        <a href="health-wellbeing.html" class="tab tab--active">Wellbeing</a>
        <a href="health.html" class="tab">Gym</a>
      </div>
      <div class="card">
        <div class="chart-placeholder" style="height: 120px;">
          <svg viewBox="0 0 300 100" preserveAspectRatio="none">
            <defs>
              <linearGradient id="gw" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="rgba(88,164,255,0.4)" />
                <stop offset="100%" stop-color="transparent" />
              </linearGradient>
            </defs>
            <path d="M0,70 Q50,30 100,55 T200,40 T300,20 L300,100 L0,100 Z" fill="url(#gw)" />
            <path d="M0,70 Q50,30 100,55 T200,40 T300,20" fill="none" stroke="#58a6ff" stroke-width="2.5" />
          </svg>
        </div>
      </div>
      <div class="card">
        <div class="flex-between"><span>🚶 <strong>Activity</strong></span></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; margin-top: 12px; text-align: center;">
          <div><strong>8000</strong><div class="muted">Steps</div></div>
          <div><strong>0</strong><div class="muted">Workouts</div></div>
        </div>
      </div>
      <div class="card">
        <div class="flex-between"><span>💧 <strong>Hydration</strong></span></div>
        <p><strong>2.0L / 2.5L</strong></p>
        <div class="progress-bar"><div class="progress-bar__fill"></div></div>
      </div>
      <div class="card">
        <div class="flex-between"><span>😊 <strong>Mood Tracking</strong></span></div>
        <div style="display: flex; justify-content: space-around; margin-top: 16px; text-align: center;">
          <div><div style="font-size: 1.5rem;">😐</div><span class="small">Fri</span></div>
          <div><div style="font-size: 1.5rem;">😐</div><span class="small">Thu</span></div>
          <div><div style="font-size: 1.5rem;">🙂</div><span class="small">Wed</span></div>
        </div>
      </div>
    </main>
    <nav class="bottom-nav" aria-label="Main">
      <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>Today</a>
      <a href="tasks.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Tasks</a>
      <a href="habits.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Habits</a>
      <a href="health-wellbeing.html" class="nav-item nav-item--active"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Health</a>
      <a href="insights.html" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Insights</a>
    </nav>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
