<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Identity — Modules</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header app-header--back">
      <a href="settings.html" class="icon-btn" aria-label="Back"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <h1 class="app-header__title" style="grid-column: 2;">Identity</h1>
      <span></span>
    </header>
    <main>
      <div class="card" style="display: flex; gap: 12px; align-items: flex-start; margin-bottom: 24px;">
        <div style="color: var(--accent); margin-top: 2px;">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        </div>
        <div>
          <strong style="display: block; font-size: 0.95rem;">Identity alignment (7d): 39%</strong>
          <span class="muted" style="font-size: 0.78rem; display: block; margin-top: 2px;">You don't fail plans. You fail identities you haven't internalized. This module makes identity measurable.</span>
        </div>
      </div>

      <div class="card" style="margin-bottom: 16px;">
        <strong style="display: block; font-size: 0.95rem; margin-bottom: 12px;">Core values</strong>
        <div style="display: flex; gap: 16px; font-size: 0.8rem; font-weight: 600;">
          <span>Health</span>
          <span>Mastery</span>
          <span>Freedom</span>
        </div>
      </div>

      <div class="card" style="margin-bottom: 16px;">
        <strong style="display: block; font-size: 0.95rem; margin-bottom: 12px;">Core identities</strong>
        <div style="display: flex; gap: 16px; font-size: 0.8rem; font-weight: 600;">
          <span>Disciplined builder</span>
          <span>Focused learner</span>
        </div>
      </div>

      <div class="card" style="margin-bottom: 24px;">
        <strong style="display: block; font-size: 0.95rem; margin-bottom: 12px;">Anti-identities</strong>
        <div style="display: flex; gap: 16px; font-size: 0.8rem; font-weight: 600;">
          <span>Chaotic procrastinator</span>
        </div>
      </div>

      <a href="settings-edit-profile.html" class="btn btn--primary btn--block" style="text-decoration: none;">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" style="margin-right: 4px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit profile
      </a>
    </main>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
