<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Login — FlowSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .auth-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 32px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--glow-soft);
      text-align: center;
    }
    
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .auth-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .auth-form {
      text-align: left;
    }

    .auth-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    
    .login-error {
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }
    
    .auth-divider {
      margin: 24px 0;
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
    }
    
    .auth-divider::before, .auth-divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .auth-divider::before { margin-right: 12px; }
    .auth-divider::after { margin-left: 12px; }
  </style>
</head>
<body>
  <div class="app" style="display: flex; justify-content: center; align-items: center;">
    <div class="auth-container" style="width: 100%;">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to your FlowSphere account to sync your habits and tasks.</p>

      <div class="login-error" id="login-error">Invalid email or password.</div>

      <form class="auth-form" id="login-form">
        <label class="auth-label" for="email">Email</label>
        <input type="email" id="email" class="input-dark" required placeholder="alex@example.com" />

        <label class="auth-label" for="password">Password</label>
        <input type="password" id="password" class="input-dark" required placeholder="••••••••" style="margin-bottom: 24px;" />

        <button type="submit" class="btn btn--primary btn--block">Sign In</button>
      </form>
      
      <div style="margin-top: 16px; font-size: 0.85rem;">
        <span style="color: var(--text-muted);">Don't have an account?</span> 
        <a href="signup.html" style="color: var(--accent); font-weight: 600;">Sign up</a>
      </div>
      
      <div class="auth-divider">OR</div>
      
      <button type="button" class="btn btn--ghost btn--block" id="google-login">
        <!-- Minimal Google Icon SVG -->
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="margin-right: 8px;"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
