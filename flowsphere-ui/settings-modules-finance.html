<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Finance — Modules</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header app-header--back">
      <a href="settings.html" class="icon-btn" aria-label="Back"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <h1 class="app-header__title" style="grid-column: 2;">Finance</h1>
      <span></span>
    </header>
    <main>
      <div class="card" style="display: flex; gap: 12px; align-items: flex-start; margin-bottom: 24px;">
        <div style="color: var(--accent); margin-top: 2px;">
          <!-- Piggy bank icon -->
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </div>
        <div>
          <strong style="display: block; font-size: 0.95rem;">Discipline score (7d): 74</strong>
          <span class="muted" style="font-size: 0.78rem; display: block; margin-top: 2px;">Log discretionary spending only. No overload.</span>
        </div>
      </div>

      <div class="section-title">
        Recent
      </div>

      <div class="card" style="display: flex; gap: 12px; align-items: center;">
        <div style="color: var(--accent);">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        </div>
        <div style="flex: 1;">
          <strong style="display: block; font-size: 0.95rem;">$6.50</strong>
          <span class="muted" style="font-size: 0.78rem; display: block; margin-top: 2px;">Coffee • Latte + pastry</span>
        </div>
        <div class="muted" style="font-size: 0.78rem;">3/27</div>
      </div>

      <div class="card" style="display: flex; gap: 12px; align-items: center;">
        <div style="color: var(--accent);">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
        </div>
        <div style="flex: 1;">
          <strong style="display: block; font-size: 0.95rem;">$95</strong>
          <span class="muted" style="font-size: 0.78rem; display: block; margin-top: 2px;">Entertainment • Concert ticket</span>
        </div>
        <div class="muted" style="font-size: 0.78rem;">3/25</div>
      </div>
    </main>
    <div class="fab-wrap">
      <button type="button" class="fab">+ Log</button>
    </div>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
