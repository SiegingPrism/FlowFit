<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Experiments — Modules</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header app-header--back">
      <a href="settings.html" class="icon-btn" aria-label="Back"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <h1 class="app-header__title" style="grid-column: 2;">Experiments</h1>
      <span></span>
    </header>
    <main>
      <div class="card" style="display: flex; gap: 12px; align-items: flex-start; margin-bottom: 24px;">
        <div style="color: var(--accent); margin-top: 2px;">
          <!-- Flask icon -->
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2v7.31M14 2v7.31M8.5 2h7M14 9.3V19a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V9.3L4.3 4.4A2 2 0 0 1 5.9 2h12.2a2 2 0 0 1 1.6 2.4L14 9.3Z"/></svg>
        </div>
        <div>
          <strong style="display: block; font-size: 0.95rem;">Self-experimentation</strong>
          <span class="muted" style="font-size: 0.78rem; display: block; margin-top: 2px;">Run one experiment at a time. Let data win.</span>
        </div>
      </div>

      <div class="card">
        <div class="flex-between" style="margin-bottom: 6px;">
          <strong style="font-size: 0.95rem;">Gym mornings</strong>
          <span style="font-size: 0.7rem; font-weight: 600;">Completed</span>
        </div>
        <p class="muted" style="font-size: 0.8rem; margin: 0 0 12px;">Training before work improves focus.</p>
        
        <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;">
          <span class="badge badge--green" style="background: rgba(33, 230, 193, 0.2); border: none; padding: 4px 10px;">mood</span>
          <span class="badge badge--green" style="background: rgba(33, 230, 193, 0.2); border: none; padding: 4px 10px;">productivity</span>
          <span class="badge badge--green" style="background: rgba(33, 230, 193, 0.2); border: none; padding: 4px 10px;">sleep</span>
        </div>
        
        <button type="button" class="btn btn--block" style="padding: 10px; font-size: 0.82rem; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--accent);">✨ Analyze</button>
      </div>
    </main>
    <div class="fab-wrap">
      <button type="button" class="fab">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" style="margin-right: 6px;"><path d="M10 2v7.31M14 2v7.31M8.5 2h7M14 9.3V19a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V9.3L4.3 4.4A2 2 0 0 1 5.9 2h12.2a2 2 0 0 1 1.6 2.4L14 9.3Z"/></svg>
        New
      </button>
    </div>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
