<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Theme — Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header app-header--back">
      <a href="settings.html" class="icon-btn" aria-label="Back"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <h1 class="app-header__title" style="grid-column: 2;">Theme</h1>
      <span></span>
    </header>
    <main>
      <p class="muted" style="padding: 16px 16px 8px;">Choose theme mode for this device.</p>
      <div class="card">
        <div class="btn-row">
          <button type="button" class="btn btn--ghost btn--block" data-theme-select="neon-dark">Neon Dark</button>
          <button type="button" class="btn btn--ghost btn--block" data-theme-select="classic-dark">Classic Dark</button>
        </div>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
