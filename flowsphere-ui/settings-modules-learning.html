<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Learning — Modules</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header app-header--back">
      <a href="settings.html" class="icon-btn" aria-label="Back"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <h1 class="app-header__title" style="grid-column: 2;">Learning</h1>
      <span></span>
    </header>
    <main>
      <div class="card" style="display: flex; gap: 12px; align-items: flex-start; margin-bottom: 24px;">
        <div style="color: var(--accent); margin-top: 2px;">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        </div>
        <div>
          <strong style="display: block; font-size: 0.95rem;">Knowledge → Skill → Identity</strong>
          <span class="muted" style="font-size: 0.78rem; display: block; margin-top: 2px;">Application beats consumption. Log “used / explained / built”.</span>
        </div>
      </div>

      <div class="section-title">
        Learning Goals
        <button type="button" style="margin-left: auto; font-size: 0.8rem; color: var(--accent); font-weight: 600;">+ Add</button>
      </div>

      <div class="card">
        <strong style="display: block; font-size: 0.95rem;">Backend fundamentals</strong>
        <p class="muted" style="font-size: 0.8rem; margin: 4px 0 16px;">Build real intuition (APIs, auth, databases).</p>
        <button type="button" class="btn btn--block" style="padding: 10px; font-size: 0.82rem; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--accent);">⚡ Log application</button>
      </div>

      <div class="card">
        <div class="flex-between">
          <strong style="display: block; font-size: 0.95rem;">Financial literacy</strong>
          <span class="badge" style="font-size: 0.65rem; background: var(--yellow); color: #000;">Decay risk</span>
        </div>
        <p class="muted" style="font-size: 0.8rem; margin: 4px 0 16px;">Spend with intent, save automatically, invest basics.</p>
        <button type="button" class="btn btn--block" style="padding: 10px; font-size: 0.82rem; background: var(--bg-elevated); border: 1px solid var(--border); color: var(--accent);">⚡ Log application</button>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
